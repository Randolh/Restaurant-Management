<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied - Restaurant Management</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Base and Specific Styles -->
  <link rel="stylesheet" href="./main.css">
  <link rel="stylesheet" href="./access-denied.css">
</head>
<body>
  
  <div class="access-denied-wrapper">
    <!-- Background grid pattern -->
    <div class="bg-grid-pattern"></div>
    
    <!-- Main Container -->
    <main class="error-card" id="errorCard">
      
      <!-- Padlock Icon -->
      <div class="error-icon-container">
        <i class="fa-solid fa-lock"></i>
      </div>
      
      <!-- Title and Message -->
      <div class="error-title">
        <h1>ACCESS DENIED</h1>
      </div>
      <p class="error-description">
        You do not have permission to view this page. Please sign in to continue.
      </p>



      <!-- Action Buttons -->
      <div class="action-buttons">
        <a href="login.html" class="btn-primary">
          <span>Back to Login</span>
        </a>

      </div>



    </main>
  </div>
</body>
</html>
