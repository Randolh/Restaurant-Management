<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Management</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Estilos Base -->
  <link rel="stylesheet" href="./main.css">
  <link rel="stylesheet" href="./sidebar.css">

</head>

<body>
  <!-- Checkbox Oculto para Toggle Puro CSS -->
  <input type="checkbox" id="sidebar-toggle-checkbox" class="sidebar-toggle-checkbox">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="./favicon.svg" alt="Restaurant Logo">
      </div>
      <h2>
        Restaurant
        <span>Management</span>
      </h2>
      <label for="sidebar-toggle-checkbox" class="sidebar-close-btn">
        <i class="fa-solid fa-chevron-left"></i>
      </label>
    </div>
    
    <nav class="sidebar-nav">
      <a href="./inventory.html" class="nav-item">
        <i class="fa-solid fa-box"></i>
        <span>Inventory</span>
      </a>
      <a href="./dishes.html" class="nav-item">
        <i class="fa-solid fa-utensils"></i>
        <span>Dishes</span>
      </a>
      <a href="./orders.html" class="nav-item">
        <i class="fa-solid fa-receipt"></i>
        <span>Orders</span>
      </a>
    </nav>

    <div class="sidebar-footer">

      <a href="#" class="nav-item">
        <i class="fa-solid fa-gear"></i>
        <span>Settings</span>
      </a>
      <a href="./login.html" class="nav-item logout-item">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
        <span>Logout</span>
      </a>
    </div>
  </aside>

  <!-- Contenido Principal -->
  <main class="main-content" id="mainContent">
    <header class="top-bar">
      <label for="sidebar-toggle-checkbox" class="sidebar-toggle">
        <i class="fa-solid fa-chevron-right"></i>
      </label>

      <!-- Menú Desplegable Móvil -->
      <nav class="mobile-dropdown">
        <a href="./inventory.html" class="mobile-nav-item"><i class="fa-solid fa-box"></i> Inventory</a>
        <a href="./dishes.html" class="mobile-nav-item"><i class="fa-solid fa-utensils"></i> Dishes</a>
        <a href="./orders.html" class="mobile-nav-item"><i class="fa-solid fa-receipt"></i> Orders</a>
        <div class="mobile-divider"></div>

        <a href="#" class="mobile-nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
        <div class="mobile-divider"></div>
        <a href="./login.html" class="mobile-nav-item logout-item"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
      </nav>
    </header>

    <div class="page-content" style="padding: 2rem; color: var(--color-text-variant); text-align: center;">
      <h2>Welcome to Restaurant Management</h2>
      <p>Select a module from the sidebar to begin.</p>
    </div>
  </main>

</body>

</html>
